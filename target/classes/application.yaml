server:
  port: 8080

spring:
  application:
    name: video-platform

  datasource:
    url: jdbc:mysql://localhost:3306/bilibili?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: 123456

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.bilibili.video.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT
jwt:
  secret: your-256-bit-secret-key-for-jwt-signature-must-be-long-enough
  expiration: 86400000  # 24 hours in ms

# MinIO
minio:
  endpoint: http://localhost:9000
  access-key: admin
  secret-key: 12345678
  bucket-video: video
  bucket-cover: cover
  bucket-avatar: avatar
  bucket-message: message

# RocketMQ
rocketmq:
  name-server: localhost:9876
  producer:
    group: video-platform-producer

# 播放量同步定时任务 (每分钟)
play-count:
  sync-cron: "0 * * * * ?"

logging:
  level:
    root: warn
    com.bilibili.video: INFO
    org.springframework.web: INFO


# ffmpeg下载路径
ffmpeg:
  path: "D:/app包/ffmpeg/ffmpeg-8.0.1-full_build/ffmpeg-8.0.1-full_build/bin/ffmpeg.exe"

video:
  search:
    enabled: true

agent:
  service:
    url: http://localhost:8001