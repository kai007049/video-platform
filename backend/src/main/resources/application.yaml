server:
  port: 8080

spring:
  application:
    name: video-platform

  datasource:
    url: jdbc:mysql://localhost:3306/video_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
    username: ${ELASTICSEARCH_USERNAME:elastic}
    password: ${ELASTICSEARCH_PASSWORD:123456}

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.bilibili.video.entity
  configuration:
    map-underscore-to-camel-case: true
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# JWT
jwt:
  secret: ${JWT_SECRET:change-me-to-a-long-random-secret-before-production}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in ms

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:12345678}
  bucket-video: video
  bucket-cover: cover
  bucket-avatar: avatar
  bucket-message: message

# RocketMQ
rocketmq:
  name-server: localhost:9876
  producer:
    group: video-platform-producer

mq:
  reliability:
    producer:
      max-retries: 3
      retry-delay-ms: 1500
      dead-letter-key: mq:producer:dead-letter
      compensation-interval-ms: 5000
    consumer:
      dedup-prefix: mq:consume:done
      dedup-ttl-hours: 168
      failure-record-key: mq:consumer:failures

# 播放量同步定时任务 (每分钟)
play-count:
  sync-cron: "0 * * * * ?"

logging:
  level:
    root: warn
    com.bilibili.video: warn
    org.springframework.web: warn


# ffmpeg 可执行文件路径
ffmpeg:
  path: ${FFMPEG_PATH:ffmpeg}

video:
  search:
    enabled: true
  cover:
    fallback-delay-ms: 2000

recommend:
  result:
    # 推荐页每次响应仍按前端 size 返回；这里控制后端可分页/排重的候选窗口大小。
    window-size: 256
    max-window-size: 1000
  recall:
    hot-size: 200
    fresh-size: 120
    tag-size-per-tag: 80
    category-size-per-category: 60
    author-size-per-author: 40
  weight:
    hot: 2.6
    fresh: 1.2
    tag: 3.4
    category: 1.8
    author: 1.6
    editorial: 0.8
    recent-watch-penalty: 1.4
  rerank:
    max-same-author: 2
    max-same-category: 3
    max-consecutive-same-category: 2
