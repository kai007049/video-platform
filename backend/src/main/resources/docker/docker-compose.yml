#version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: video_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: video_platform
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
  redis:
    image: redis:7
    container_name: video_redis
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: video_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - ./es_data:/usr/share/elasticsearch/data
    command: >
      bash -c "if ! /usr/share/elasticsearch/bin/elasticsearch-plugin list | grep -q analysis-ik; then
      /usr/share/elasticsearch/bin/elasticsearch-plugin install --batch analysis-ik;
      fi;
      /usr/local/bin/docker-entrypoint.sh"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: video_kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"

  minio:
    image: minio/minio
    container_name: video_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-12345678}
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data

  rocketmq-nameserver:
    image: apache/rocketmq:5.1.4
    container_name: rmqnamesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: rmqbroker
    depends_on:
      - rocketmq-nameserver
    environment:
      - NAMESRV_ADDR=rocketmq-nameserver:9876
    volumes:
      - ./broker.conf:/home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    command: >
      sh mqbroker -n rocketmq-nameserver:9876 -c /home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    ports:
      - "10911:10911"
      - "10909:10909"

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: rmqdashboard
    depends_on:
      - rocketmq-nameserver
    environment:
      - NAMESRV_ADDR=rocketmq-nameserver:9876
    ports:
      - "8082:8082"
